services:
  n8n:
    image: n8nio/n8n
    container_name: n8n
    ports:
      - 5678:5678
    volumes:
      - D:/Work/volume/n8n:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - OLLAMA_HOST=http://host.docker.internal:11434
      - LM_STUDIO_BASE_URL=http://host.docker.internal:1234/v1
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - ollama
    networks:
      - ollama-docker

  ollama:
    image: ollama/ollama  # specifically designed to run on systems without GPU support
    container_name: ollama
    ports:
      - 11434:11434
    volumes:
      - D:/Work/volume/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    tty: true
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_CONTEXT_LENGTH=131072
    networks:
      - ollama-docker

  ollama-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ollama-webui
    volumes:
      - D:/Work/volume/ollama-webui:/app/backend/data
    ports:
      - 8000:8080
    environment:
      - OLLAMA_BASE_URLS=http://host.docker.internal:11434 #comma separated ollama hosts
      - ENV=dev
      - WEBUI_AUTH=False
      - WEBUI_NAME=My Local AI
      - WEBUI_URL=http://localhost:8080
      - WEBUI_SECRET_KEY=$PASS
      - NO_PROXY=host.docker.internal
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - ollama
    networks:
      - ollama-docker

networks:
  ollama-docker:
    external: false
